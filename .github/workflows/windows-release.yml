name: Windows Release
on:
  push:
    tags:
      - 'v*'
jobs:
  build:
    runs-on: windows-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          fetch-tags: true
      - name: Set up Rust
        shell: pwsh
        run: |
          rustup install stable
          rustup default stable
          rustup target add x86_64-pc-windows-msvc
      - name: Verify tag matches Cargo.toml version
        id: get_version
        shell: pwsh
        run: |
          $tagVersion = "${{ github.ref_name }}" -replace '^v', ''
          $cargoVersion = (Select-String -Path Cargo.toml -Pattern '^version\s*=\s*"(.*)"').Matches.Groups[1].Value
          if ($tagVersion -ne $cargoVersion) {
            Write-Error "Tag version ($tagVersion) does not match Cargo.toml version ($cargoVersion)"
            exit 1
          }
          "version=$cargoVersion" | Out-File -FilePath $env:GITHUB_OUTPUT -Encoding utf8 -Append
      - name: Build project
        run: cargo build --release --target x86_64-pc-windows-msvc
      - name: Zip executable
        run: |
          $exePath = "target\x86_64-pc-windows-msvc\release\ms2cc.exe"
          Compress-Archive -Path $exePath -DestinationPath "ms2cc-${{ steps.get_version.outputs.version }}.zip"
      - name: Generate changelog
        id: changelog
        shell: pwsh
        run: |
          $lastTag = git describe --tags --abbrev=0 HEAD^ 2>$null
          if ($LASTEXITCODE -ne 0 -or -not $lastTag) {
            $log = git log --pretty=format:"* %h - %s by %an"
          } else {
            $log = git log "$lastTag..HEAD" --pretty=format:"* %h - %s by %an"
          }
          "changelog<<EOF" | Out-File -FilePath $env:GITHUB_OUTPUT -Append -NoNewline
          "`n" | Out-File -FilePath $env:GITHUB_OUTPUT -Append -NoNewline
          $log | Out-File -FilePath $env:GITHUB_OUTPUT -Append
          "EOF" | Out-File -FilePath $env:GITHUB_OUTPUT -Append
      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ steps.get_version.outputs.version }}
          name: Release v${{ steps.get_version.outputs.version }}
          body: ${{ steps.changelog.outputs.changelog }}
          files: ms2cc-${{ steps.get_version.outputs.version }}.zip
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
